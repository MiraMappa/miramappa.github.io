media:
  input: assets/images
  output: /assets/images

content:
  - name: projects
    label: Projects (EN)
    type: collection
    path: _projects
    format: yaml-frontmatter
    filename: "{fields.page_name}.md"
    fields:
      - name: page_name
        label: Page Name
        type: string
      - name: title
        label: Map Title
        type: string
      - name: description
        label: Short Description
        type: string
      - name: download_url
        label: Download Link
        type: string
      - name: year
        label: Release Year
        type: number
      - name: languages
        label: Language(s)
        type: string
      - name: mc_version
        label: Minecraft Version
        type: string
      - name: players
        label: Player Count
        type: string
      - name: mods
        label: Mods Required
        type: string
      - name: release_date
        label: Release Date
        type: date
      - name: update_date
        label: Last Updated
        type: date
      - name: project_tags
        label: Tags
        type: string
      - name: media
        label: Media
        type: block
        list: true
        blocks:
          - name: asset
            label: Media Asset
            fields:
              - name: type
                label: Type
                type: select
                options:
                  values: [ image, video ]
              - name: src
                label: Link
                type: string
      - name: layout
        label: Page Layout
        type: string
        default: project
      - name: body
        label: Description
        type: text

  - name: ru_projects
    label: Проекты (RU)
    type: collection
    path: _ru_projects
    format: yaml-frontmatter
    fields:
      - name: title
        label: Название карты
        type: string
      - name: description
        label: Короткое описание
        type: string
      - name: download_url
        label: Ссылка на скачивание
        type: string
      - name: year
        label: Год Релиза
        type: number
      - name: languages
        label: Язык(и)
        type: string
      - name: mc_version
        label: Версия Minecraft
        type: string
      - name: players
        label: Кол-во игроков
        type: string
      - name: mods
        label: Требуемые моды
        type: string
      - name: release_date
        label: Дата релиза
        type: date
      - name: update_date
        label: Дата последнего обновления
        type: date
      - name: project_tags
        label: Теги
        type: string
      - name: media
        label: Медиа
        type: block
        list: true
        blocks:
          - name: asset
            label: Ассет Медиа
            fields:
              - name: type
                label: Type
                type: select
                options:
                  values: [ image, video ]
              - name: src
                label: Link
                type: string
      - name: layout
        label: Шаблон страницы
        type: string
        default: project_ru
      - name: body
        label: Описание
        type: text

  - name: members
    label: Team Members
    type: collection
    path: _members
    format: yaml-frontmatter
    fields:
      - name: name
        label: Name
        type: string
      - name: description
        label: Description
        type: string
      - name: description_ru
        label: Описание
        type: string